<body>

    <script src="https://code.jquery.com/jquery-3.7.1.slim.min.js"></script>

    <script type="application/javascript">

        function createFamilyTree() {

            $("body").append(
                "<table>" +
                    "<thead>" +
                        "<tr>" +
                            "<th>Firstname</th>" +
                            "<th>Lastname</th>" +
                        "</tr>" +
                    "</thead>" +
                    "<tbody></tbody>" +
                "</table>"
            );

        }

        function replaceFamilyTree() {

            $("tbody").html(
                "<tr>" +
                    "<td>Gerard</td>" +
                    "<td>Bonissa</td>" +
                "</tr>"
            );

        }

        createFamilyTree();
        replaceFamilyTree();

    </script>

</body>
