<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8" />
    <title>Task 12</title>
</head>

<body>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script type="application/javascript">

        function addPostRow(data) {

            $("body").append(
                $("<p></p>")
                    .attr("id", "row-" + data.id)
                    .append(
                        $("<span></span>")
                            .text("(delete) ")
                            .css("cursor", "pointer")
                            .click(function () {
                                deletePost(data.id);
                            }),
                        $("<span></span>").text(
                            "Post created with id " +
                            data.id +
                            ", title: " +
                            data.title +
                            ", author: " +
                            data.author
                        )
                    )
            );

        }

        function listPosts() {

            $.get("http://localhost:3000/posts")
                .done(function (response) {
                    response.forEach(function (post) {
                        addPostRow(post);
                    });
                })
                .fail(function () {
                    alert("Server Error");
                });

        }

        function deletePost(id) {

            $.ajax({
                url: "http://localhost:3000/posts/" + id,
                type: "DELETE"
            })
                .done(function () {
                    $("#row-" + id).remove();
                })
                .fail(function () {
                    alert("Post was not deleted");
                });

        }

        function buildForm() {
            $("body").append("<form></form>");
        }

        listPosts();

    </script>

</body>

</html>
